spring:
  config:
    import: optional:file:./config/runtime-db.properties

  application:
    name: anpr-access-control
  
  # H2 Database Configuration
  datasource:
    url: jdbc:h2:file:./data/anprdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

# JWT Configuration
jwt:
  secret: YourSuperSecretKeyForJWTAuthenticationMustBeAtLeast256BitsLongForHS256Algorithm123456789
  expiration: 86400000  # 24 hours in milliseconds

# ANPR Configuration
anpr:
  min-confidence-score: 85
  erp:
    bootstrap-enabled: true
    reload-on-startup: false
    csv-resource: file:./Database_Schema.csv
  decision:
    allowed-statuses: SECURITY,ACTIVE
    allowed-directions: APPROACH
    allowed-locations:
    max-quantity: 100000
    enforce-queue-order: true
    reopen-cooldown-minutes: 5
  # Camera relay endpoint template (IP will be replaced)
  relay-endpoint-template: http://{ip}/ISAPI/System/IO/outputs/1/trigger
  # Authentication for camera (if required)
  camera:
    username: admin
    password: admin123

# Logging Configuration
logging:
  file:
    name: logs/anpr-access-control.log
  level:
    root: INFO
    com.anpr: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%5p] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%5p] [%thread] %logger{36} - %msg%n"
